name: Deploy img2svg

on:
  workflow_dispatch:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        run: |
          cd web
          npm ci
          npm run build

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -cover ./...

  deploy:
    name: Deploy
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Print runner IP
        run: |
          echo "GitHub Actions runner public IP: $(curl -s https://api.ipify.org)"
          echo "If Alibaba Cloud reports 'unusual login location', this IP is the source."

      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        run: |
          cd web
          npm ci
          npm run build

      - name: Build Go binary
        run: |
          GOOS=linux GOARCH=amd64 go build -o img2svg .

      - name: Deploy to ECS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.IMG2SVG_SERVER }}
          username: ${{ secrets.IMG2SVG_USER }}
          key: ${{ secrets.IMG2SVG_SSH_KEY }}
          source: "img2svg"
          target: "/srv/img2svg/releases/${{ github.sha }}/"

      - name: Restart service
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.IMG2SVG_SERVER }}
          username: ${{ secrets.IMG2SVG_USER }}
          key: ${{ secrets.IMG2SVG_SSH_KEY }}
          script: |
            set -e
            RELEASE="/srv/img2svg/releases/${{ github.sha }}"
            chmod +x "$RELEASE/img2svg"
            # 先停止服务，避免覆盖运行中的二进制时报 Text file busy
            systemctl stop img2svg
            # 移除旧的 current 目录（如果误创建为目录而非 symlink）
            if [ -d /srv/img2svg/current ] && [ ! -L /srv/img2svg/current ]; then
              rm -rf /srv/img2svg/current
            fi
            ln -sfn "$RELEASE" /srv/img2svg/current
            cp "$RELEASE/img2svg" /usr/local/bin/img2svg
            systemctl start img2svg
            # 清理旧 release，保留最近 3 个
            ls -1dt /srv/img2svg/releases/*/ 2>/dev/null | tail -n +4 | xargs -r rm -rf
            # 健康检查
            sleep 3
            curl -fsS "http://localhost:${{ secrets.IMG2SVG_PORT || '4003' }}/api/health" || {
              echo "健康检查失败"
              systemctl status img2svg || true
              exit 1
            }
